<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Evaluation — Duiker Properties</title>
  <link rel="stylesheet" href="../shared/css/tokens.css">
  <style>
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
      .page { box-shadow: none; }
    }

    body { background: #e8e4dc; }

    /* ── Top bar (hidden in present mode) ── */
    .top-bar {
      background: var(--navy);
      color: var(--white);
      padding: 12px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      no-print;
    }
    .top-bar .brand { font-family: var(--font-heading); font-size: 18px; }
    .top-bar .brand span { color: var(--gold); }

    /* ── Page ── */
    .page {
      max-width: 900px;
      margin: 32px auto;
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-modal);
    }

    /* ── Hero ── */
    .hero {
      background: var(--navy);
      padding: 48px 56px;
      color: var(--white);
    }
    .hero .pre-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .hero h1 {
      font-family: var(--font-heading);
      font-size: 42px;
      color: var(--white);
      line-height: 1.1;
      margin-bottom: 8px;
    }
    .hero .community {
      font-size: 16px;
      opacity: 0.65;
    }
    .hero .property-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 24px;
    }
    .chip {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      color: var(--white);
    }

    /* ── Sections ── */
    .section {
      padding: 40px 56px;
      border-bottom: 1px solid var(--gray-100);
    }
    .section:last-child { border-bottom: none; }
    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 20px;
    }

    /* ── Comp table ── */
    .comp-table { width: 100%; border-collapse: collapse; }
    .comp-table th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--gray-600);
      font-weight: 500;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 2px solid var(--gray-100);
    }
    .comp-table td {
      padding: 14px 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--gray-100);
      vertical-align: middle;
    }
    .comp-table tr:last-child td { border-bottom: none; }
    .comp-table .price-cell {
      font-family: var(--font-heading);
      font-size: 18px;
      color: var(--navy);
      font-weight: 600;
    }
    .comp-num-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: var(--navy);
      color: var(--white);
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      margin-right: 8px;
    }

    /* ── Price range ── */
    .price-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--gray-100);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .price-cell-item {
      background: var(--white);
      padding: 28px 24px;
      text-align: center;
    }
    .price-cell-item.recommended { background: var(--navy); }
    .price-cell-item .cell-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gray-600);
      margin-bottom: 8px;
    }
    .price-cell-item.recommended .cell-label { color: var(--gold); opacity: 0.8; }
    .price-cell-item .cell-value {
      font-family: var(--font-heading);
      font-size: 34px;
      color: var(--navy);
      line-height: 1;
    }
    .price-cell-item.recommended .cell-value { color: var(--gold); }

    /* ── Footer ── */
    .footer {
      background: var(--navy);
      padding: 24px 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer .brand {
      font-family: var(--font-heading);
      font-size: 18px;
      color: var(--white);
    }
    .footer .brand span { color: var(--gold); }
    .footer .agent-info {
      text-align: right;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    /* ── Notes ── */
    .notes-box {
      background: var(--off-white);
      border-left: 3px solid var(--gold);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      padding: 16px 20px;
      font-size: 14px;
      color: var(--gray-600);
      line-height: 1.7;
    }

    /* ── Empty ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      color: var(--gray-600);
    }
  </style>
</head>
<body>

<!-- Top bar (no-print) -->
<div class="top-bar no-print">
  <div class="brand">Duiker <span>Properties</span></div>
  <div style="display:flex; gap:12px;">
    <button class="btn btn-gold" onclick="window.print()">🖨 Print / PDF</button>
    <button class="btn btn-outline" style="border-color:rgba(255,255,255,0.3); color:var(--white);" onclick="window.history.back()">← Back to Builder</button>
  </div>
</div>

<div id="page-container">
  <div class="empty"><p>Loading evaluation…</p></div>
</div>

<script src="../shared/js/storage.js"></script>
<script>
function render(ev) {
  const s = ev.subject || {};
  const comps = ev.comps || [];

  // calc price range
  const prices = comps.map(c => c.soldPrice).filter(p => p > 0);
  const adj = 1 + ((ev.adjustmentPercent || 0) / 100);
  let low='—', mid='—', high='—';
  if (prices.length) {
    const sorted = [...prices].sort((a,b) => a-b);
    low  = formatCurrency(Math.round(sorted[0] * adj / 1000) * 1000);
    high = formatCurrency(Math.round(sorted[sorted.length-1] * adj / 1000) * 1000);
    mid  = formatCurrency(Math.round((prices.reduce((a,b)=>a+b,0)/prices.length) * adj / 1000) * 1000);
  }

  const chips = [
    s.style, s.bedrooms ? s.bedrooms+' Bed' : '', s.bathrooms ? s.bathrooms+' Bath' : '',
    s.sqft ? s.sqft.toLocaleString()+' sq ft' : '', s.garage, s.basement, s.year ? 'Built '+s.year : ''
  ].filter(Boolean);

  document.getElementById('page-container').innerHTML = `
    <div class="page">
      <div class="hero">
        <div class="pre-label">Comparative Market Analysis</div>
        <h1>${s.address || 'Subject Property'}</h1>
        <div class="community">${s.community ? s.community + ' · Calgary, AB' : 'Calgary, AB'}</div>
        ${chips.length ? `<div class="property-chips">${chips.map(c => `<span class="chip">${c}</span>`).join('')}</div>` : ''}
      </div>

      ${comps.length > 0 ? `
      <div class="section">
        <div class="section-label">Recent Comparable Sales</div>
        <table class="comp-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Address</th>
              <th>Sold</th>
              <th>Sq Ft</th>
              <th>Beds / Baths</th>
              <th>Sold Price</th>
            </tr>
          </thead>
          <tbody>
            ${comps.map((c, i) => `
              <tr>
                <td><span class="comp-num-badge">${i+1}</span></td>
                <td>${c.address || '—'}</td>
                <td style="color:var(--gray-600); font-size:13px;">${formatDate(c.soldDate)}</td>
                <td>${c.sqft ? Number(c.sqft).toLocaleString() : '—'}</td>
                <td>${c.bedrooms||'—'} / ${c.bathrooms||'—'}</td>
                <td class="price-cell">${formatCurrency(c.soldPrice)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>` : ''}

      <div class="section">
        <div class="section-label">Estimated Market Value</div>
        <div class="price-grid">
          <div class="price-cell-item">
            <div class="cell-label">Conservative</div>
            <div class="cell-value">${low}</div>
          </div>
          <div class="price-cell-item recommended">
            <div class="cell-label">Recommended</div>
            <div class="cell-value">${mid}</div>
          </div>
          <div class="price-cell-item">
            <div class="cell-label">Aggressive</div>
            <div class="cell-value">${high}</div>
          </div>
        </div>
        ${ev.adjustmentPercent ? `<p style="font-size:12px; color:var(--gray-600); margin-top:12px;">* Includes ${ev.adjustmentPercent > 0 ? '+' : ''}${ev.adjustmentPercent}% adjustment for subject property condition and features.</p>` : ''}
      </div>

      ${ev.notes ? `
      <div class="section">
        <div class="section-label">Market Notes</div>
        <div class="notes-box">${ev.notes}</div>
      </div>` : ''}

      <div class="footer">
        <div class="brand">Duiker <span>Properties</span></div>
        <div class="agent-info">
          Kyle Duiker · Broker Associate<br>
          Royal LePage Solutions<br>
          ${formatDate(ev.updatedAt || ev.createdAt)}
        </div>
      </div>
    </div>
  `;
}

// ── Load from URL param or most recent ──
const params = new URLSearchParams(window.location.search);
const id = params.get('id');
const ev = id ? getEvaluation(id) : (getAllEvaluations()[0] || null);

if (ev) {
  render(ev);
} else {
  document.getElementById('page-container').innerHTML = `
    <div class="empty">
      <p style="font-size:20px; font-family:var(--font-heading); color:var(--navy);">No evaluation found.</p>
      <p style="margin-top:8px;">Open the <a href="../builder/">CMA Builder</a> to create one.</p>
    </div>`;
}
</script>
</body>
</html>
